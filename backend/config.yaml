name: "Life OS"
description: "All-in-one Life OS: Dashboard, Mail Bridge & Auto-Backup."
version: "2.0.0"
slug: "life_os"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto

options: {}
schema: {}

ingress: true
ingress_port: 8099
panel_icon: mdi:view-dashboard
panel_title: Life OS

# Map HA /config directory so the addon can write backup files there
map:
  - config:rw

# Direct port access (fallback for local use without Ingress)
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Life OS Dashboard & API"

host_network: false
