services:
  # ─────────────────────────────────────────────
  # 1. CORE: Life OS
  # ─────────────────────────────────────────────
  life-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: life-os
    restart: unless-stopped
    network_mode: host
    volumes:
      - life-os-config:/config
      - life-os-logs:/app/logs
    labels:
      io.casaos.app.name: "Life OS"
      io.casaos.app.icon: "https://raw.githubusercontent.com/LeonPark-gif/life-os/main/public/logo.png"
      io.casaos.app.description: "Dein persönlicher KI-Assistent & Dashboard"
      io.casaos.app.port: "8099"
    # ports and networks removed for host mode

    # ─────────────────────────────────────────────
    # 2. UPDATER: Watchtower
    # ─────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_REVIVE_STOPPED=false
      - WATCHTOWER_POLL_INTERVAL=86400 # Check once a day
    network_mode: host

  # ─────────────────────────────────────────────
  # 3. DOCUMENTS: Paperless-ngx Stack
  # ─────────────────────────────────────────────
  paperless-broker:
    image: redis:7
    container_name: paperless-broker
    restart: unless-stopped
    volumes:
      - paperless-redis-data:/data
    network_mode: host

  paperless-db:
    image: postgres:15
    container_name: paperless-db
    restart: unless-stopped
    volumes:
      - paperless-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${PAPERLESS_DB_PASS:-paperless_pass_123}
    network_mode: host

  paperless-gotenberg:
    image: gotenberg/gotenberg:8
    container_name: paperless-gotenberg
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    network_mode: host

  paperless-tika:
    image: apache/tika:latest
    container_name: paperless-tika
    restart: unless-stopped
    network_mode: host

  paperless-web:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-web
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-broker
      - paperless-gotenberg
      - paperless-tika
    network_mode: host
    environment:
      - PAPERLESS_REDIS=redis://localhost:6379
      - PAPERLESS_DBHOST=localhost
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=${PAPERLESS_DB_PASS:-paperless_pass_123}
      - PAPERLESS_TIKA_ENABLED=1
      - PAPERLESS_TIKA_GOTENBERG_ENDPOINT=http://localhost:3000
      - PAPERLESS_TIKA_ENDPOINT=http://localhost:9998
      - PAPERLESS_URL=${PAPERLESS_URL:-}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY:-change_me_to_random_string}
      - PAPERLESS_TIME_ZONE=Europe/Berlin
      - PAPERLESS_OCR_LANGUAGE=deu
      - type: bind
        source: "/DATA/AppData/big-bear-nextcloud/html/data/Leon Da Silva/files/KI-Scan"
        target: /usr/src/paperless/consume
    labels:
      io.casaos.app.name: "Paperless-ngx"
      io.casaos.app.icon: "https://raw.githubusercontent.com/paperless-ngx/paperless-ngx/main/docs/static/paperless-ngx-logo.svg"
      io.casaos.app.description: "Dokumentenmanagement System"
      io.casaos.app.port: "8000"

  # ─────────────────────────────────────────────
  # 4. FINANCES: Firefly III Stack
  # ─────────────────────────────────────────────
  firefly-db:
    image: mariadb:lts
    container_name: firefly-db
    restart: unless-stopped
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_USER=firefly
      - MYSQL_PASSWORD=${FIREFLY_DB_PASS:-firefly_db_secret}
      - MYSQL_DATABASE=firefly
    volumes:
      - firefly-db-data:/var/lib/mysql
    network_mode: host

  firefly-app:
    image: fireflyiii/core:latest
    container_name: firefly-app
    restart: unless-stopped
    depends_on:
      - firefly-db
    network_mode: host
    environment:
      - APP_KEY=${FIREFLY_APP_KEY:-SomeRandomStringOf32CharsExactly}
      - APP_URL=${FIREFLY_URL:-http://localhost:8080}
      - DB_CONNECTION=mysql
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_DATABASE=firefly
      - DB_USERNAME=firefly
      - DB_PASSWORD=${FIREFLY_DB_PASS:-firefly_db_secret}
      - TZ=Europe/Berlin
    volumes:
      - firefly-upload:/var/www/html/storage/upload
    labels:
      io.casaos.app.name: "Firefly III"
      io.casaos.app.icon: "https://raw.githubusercontent.com/firefly-iii/firefly-iii/main/public/v1/images/apple-touch-icon.png"
      io.casaos.app.description: "Finanzmanagement & Budgetierung"
      io.casaos.app.port: "8080"

  firefly-importer:
    image: fireflyiii/data-importer:latest
    container_name: firefly-importer
    restart: unless-stopped
    depends_on:
      - firefly-app
    network_mode: host
    environment:
      - FIREFLY_III_URL=http://localhost:8080
      - VANITY_URL=${FIREFLY_URL:-http://localhost:8080}
      - FIREFLY_III_ACCESS_TOKEN=${FIREFLY_PAT_TOKEN:-}

  # ─────────────────────────────────────────────
  # 5. VOICE: Wyoming Pipeline (Local STT & TTS)
  # ─────────────────────────────────────────────
  whisper:
    image: rhasspy/wyoming-whisper
    container_name: whisper
    restart: unless-stopped
    command: --model tiny-int8 --language de --beam-size 1
    volumes:
      - whisper-data:/data
    network_mode: host

  piper:
    image: rhasspy/wyoming-piper
    container_name: piper
    restart: unless-stopped
    command: --voice de_DE-thorsten-high
    volumes:
      - piper-data:/data
    network_mode: host
  # ─────────────────────────────────────────────
  # 6. MQTT: Mosquitto Broker (Optional but recommended)
  # ─────────────────────────────────────────────
  # mosquitto:
  #   image: eclipse-mosquitto:2
  #   container_name: mosquitto
  #   restart: unless-stopped
  #   ports:
  #     - "1883:1883"
  #     - "9001:9001"
  #   volumes:
  #     - mosquitto-data:/mosquitto/data
  #     - mosquitto-log:/mosquitto/log
  #   # Note: For testing, it runs without auth by default if no config is provided
  #   network_mode: host

volumes:
  life-os-config:
  life-os-logs:
  paperless-redis-data:
  paperless-pgdata:
  paperless-data:
  paperless-media:
  firefly-db-data:
  firefly-upload:
  whisper-data:
  piper-data:
